kind = "web"
previewPath = "/"
title = "Dhrona AI Website"
version = "1.0.0"
id = "artifacts/dhrona-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21855

[services.development]
run = "pnpm --filter @workspace/dhrona-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dhrona-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/dhrona-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21855"
BASE_PATH = "/"
